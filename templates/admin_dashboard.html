<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        h2 { border-bottom: 2px solid #333; padding-bottom: 10px; }
        .dashboard-grid { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
        .card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; width: 200px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card h3 { margin-top: 0; color: #555; }
        .count { font-size: 32px; font-weight: bold; color: #007bff; margin: 10px 0; }
        .btn { display: inline-block; padding: 8px 16px; background-color: #007bff; color: white; text-decoration: none; border-radius: 4px; margin-top: 10px; }
        .btn:hover { background-color: #0056b3; }
        .logout { float: right; color: red; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <a href="{{ url_for('logout') }}" class="logout">Logout</a>
    <h2>Admin Dashboard</h2>

    <div class="dashboard-grid">
        <!-- Companies Card -->
        <div class="card">
            <h3>Companies</h3>
            <div class="count">{{ companies }}</div>
            <a href="{{ url_for('admin_companies') }}" class="btn">Manage Companies</a>
        </div>

        <!-- Drives Card -->
        <div class="card">
            <h3>Placement Drives</h3>
            <div class="count">{{ drives }}</div>
            <a href="{{ url_for('admin_drives') }}" class="btn">Manage Drives</a>
        </div>

        <!-- Students Card -->
        <div class="card">
            <h3>Students</h3>
            <div class="count">{{ students }}</div>
            <a href="{{ url_for('admin_students') }}" class="btn">View Students</a>
        </div>
    </div>

</body>
</html>
